<ion-header>
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/"></ion-back-button>
    </ion-buttons>
    <ion-title>
      <span translate>Connection</span>
    </ion-title>
  </ion-toolbar>
</ion-header>

<ion-content>
  <ion-list>
    <ion-item>
      <ion-label class="ion-text-wrap">
        <span translate>Connection timeout</span>
      </ion-label>
      <ion-range [(ngModel)]="ranges.connection" min="1000" max="5000" step="500" snaps="true">
        <ion-label slot="start">1 s</ion-label>
        <ion-label slot="end">5 s</ion-label>
      </ion-range>
    </ion-item>
    <ion-item>
      <ion-label class="ion-text-wrap">
        <span translate>Request timeout</span>
      </ion-label>
      <ion-range [(ngModel)]="ranges.request" min="1000" max="5000" step="500" snaps="true">
        <ion-label slot="start">1 s</ion-label>
        <ion-label slot="end">5 s</ion-label>
      </ion-range>
    </ion-item>
    <ion-item>
      <ion-label class="ion-text-wrap">
        <span translate>Reconnect delay</span>
      </ion-label>
      <ion-range [(ngModel)]="ranges.reconnect" dualKnobs="true" min="2000" max="10000" step="1000" snaps="true">
        <ion-label slot="start">2 s</ion-label>
        <ion-label slot="end">10 s</ion-label>
      </ion-range>
    </ion-item>
    <ion-item *ngIf="type">
      <ion-select label="{{'Connection type' | translate}}" [(ngModel)]="type" cancelText="{{'Cancel' | translate}}" okText="{{'OK' | translate}}">
        <!-- ion-option seems to require translate attribute value; see
             https://github.com/ionic-team/ionic/issues/8561#issuecomment-391079689
          -->
        <ion-select-option translate value="web-bluetooth">Bluetooth</ion-select-option>
        <ion-select-option translate value="web-serial">USB-Serial</ion-select-option>
      </ion-select>
    </ion-item>
    <ion-item>
      <ion-toggle [(ngModel)]="demo" translate>Demo Control Unit</ion-toggle>
    </ion-item>
  </ion-list>
</ion-content>
