<ng-template ngFor let-peripheral [ngForOf]="peripherals | async">
  <ion-menu-toggle *ngIf="!peripheral.equals(selected)">
    <ion-item button (click)="onSelect(peripheral)">
      <ion-label>
        <h2>{{peripheral.name}}</h2>
        <h4>{{peripheral.address}}</h4>
      </ion-label>
    </ion-item>
  </ion-menu-toggle>
</ng-template>
